name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh bin/agentic-tmux lib/*.sh \
            config/bash/agentic-tmux.sh config/zsh/agentic-tmux.zsh \
            config/shell/agentic-tmux.inc.sh \
            config/worktrunk/dev-layout.sh config/worktrunk/dev-layout-cmd.sh \
            config/agentic-tmux/config-reader.sh
